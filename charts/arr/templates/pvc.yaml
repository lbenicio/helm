{{- range .Values.persistence.config }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .claimName | default (printf "%s-%s" (include "arr.fullname" $) .name) }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "arr.labels" $ | nindent 4 }}
spec:
  storageClassName: {{ .storageClass | default "local-path" }}
  accessModes:
    - {{ .accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .size }}
{{- end }}
