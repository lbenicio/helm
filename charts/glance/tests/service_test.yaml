suite: glance service
templates:
  - svc.yaml
tests:
  - it: should be a ClusterIP Service
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP
  - it: should have correct port
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 8080
            targetPort: 8080
            protocol: TCP
