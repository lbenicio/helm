apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helm-pilot.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helm-pilot.labels" . | nindent 4 }}
  {{- if .Values.keel.enabled }}
  annotations:
    keel.sh/policy: {{ .Values.keel.policy | quote }}
    keel.sh/trigger: {{ .Values.keel.trigger | quote }}
    keel.sh/pollSchedule: {{ .Values.keel.pollSchedule | quote }}
    keel.sh/match-tag: {{ .Values.keel.matchTag | quote }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "helm-pilot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "helm-pilot.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if or .Values.keel.enabled .Values.podAnnotations }}
      annotations:
        {{- if .Values.keel.enabled }}
        keel.sh/policy: {{ .Values.keel.policy | quote }}
        keel.sh/trigger: {{ .Values.keel.trigger | quote }}
        keel.sh/pollSchedule: {{ .Values.keel.pollSchedule | quote }}
        keel.sh/match-tag: {{ .Values.keel.matchTag | quote }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "helm-pilot.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            {{- if .Values.config.oidc.enabled }}
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "helm-pilot.fullname" . }}-oidc
                  key: clientId
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "helm-pilot.fullname" . }}-oidc
                  key: clientSecret
            - name: OIDC_ISSUER_URL
              value: {{ .Values.config.oidc.issuerUrl | quote }}
            {{- if .Values.config.oidc.scopes }}
            - name: OIDC_SCOPES
              value: {{ .Values.config.oidc.scopes | quote }}
            {{- end }}
            {{- if .Values.config.oidc.skipTlsVerify }}
            - name: OIDC_SKIP_TLS_VERIFY
              value: "true"
            {{- end }}
            {{- end }}
            {{- if .Values.config.appUrl }}
            - name: APP_URL
              value: {{ .Values.config.appUrl | quote }}
            {{- end }}
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.config.oidc.caCertSecret }}
            - name: ca-cert
              mountPath: /etc/ssl/certs/my-selfsigned-ca.crt
              subPath: ca.crt
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- if .Values.config.oidc.caCertSecret }}
        - name: ca-cert
          secret:
            secretName: {{ .Values.config.oidc.caCertSecret }}
            items:
              - key: ca.crt
                path: ca.crt
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      restartPolicy: Always
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
