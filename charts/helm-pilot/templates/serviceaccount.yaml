apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "helm-pilot.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helm-pilot.labels" . | nindent 4 }}
{{- if .Values.serviceAccount.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "helm-pilot.fullname" . }}
  labels:
    {{- include "helm-pilot.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "secrets", "nodes", "namespaces", "resourcequotas"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["users", "groups", "serviceaccounts"]
    verbs: ["impersonate"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "helm-pilot.fullname" . }}
  labels:
    {{- include "helm-pilot.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "helm-pilot.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "helm-pilot.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# OIDC Group: admin --> cluster-admin (full access)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "helm-pilot.fullname" . }}-oidc-admin
  labels:
    {{- include "helm-pilot.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: Group
    name: admin
{{- if .Values.serviceAccount.oidcMonitoringGroup }}
---
# OIDC Group: monitoring --> view (read-only)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "helm-pilot.fullname" . }}-oidc-monitoring
  labels:
    {{- include "helm-pilot.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: Group
    name: {{ .Values.serviceAccount.oidcMonitoringGroup }}
{{- end }}
{{- end }}
