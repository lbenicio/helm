# helm install homebridge ./charts/homebridge --namespace default

# -----------------------------------------------------------------------------
# Global Docker image settings
# -----------------------------------------------------------------------------
image:
  # -- Image repository
  repository: homebridge/homebridge
  # -- Image tag (defaults to Chart.appVersion)
  tag: ""
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
imagePullSecrets: []
# -- Override the name of the chart
nameOverride: ""
# -- Override the full name of the release
fullnameOverride: ""

# -- Number of replicas (ignored if autoscaling.enabled is true)
replicaCount: 1

# -----------------------------------------------------------------------------
# ServiceAccount configuration
# -----------------------------------------------------------------------------
serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- ServiceAccount name (defaults to fullname)
  name: ""

# -----------------------------------------------------------------------------
# Keel auto-update annotations
# -----------------------------------------------------------------------------
keel:
  # -- Enable Keel auto-update annotations
  enabled: false
  # -- Keel update policy (e.g., force, major, minor, patch)
  policy: force
  # -- Keel trigger type (e.g., poll, webhook)
  trigger: poll
  # -- Keel poll schedule (cron syntax or @every duration)
  pollSchedule: "@every 24h"
  # -- Match tag pattern
  matchTag: "true"

# -----------------------------------------------------------------------------
# Labels
# -----------------------------------------------------------------------------
# -- Common labels to add to all resources
commonLabels: {}
# -- Pod-specific labels
podLabels: {}
# -- Pod annotations (e.g., prometheus.io/scrape: "true")
podAnnotations: {}

# -----------------------------------------------------------------------------
# Security Context
# -----------------------------------------------------------------------------
# -- Pod-level security context
podSecurityContext:
  fsGroup: 1000
# -- Container-level security context (Homebridge needs privileged for Bluetooth/HAP)
containerSecurityContext:
  readOnlyRootFilesystem: false
  runAsNonRoot: false
  runAsUser: 1000
  # privileged: true  # Uncomment if homebridge needs privileged mode

# -----------------------------------------------------------------------------
# Homebridge requires hostNetwork for mDNS/Bonjour discovery
# -----------------------------------------------------------------------------
hostNetwork: false

# -----------------------------------------------------------------------------
# Bluetooth configuration
# -----------------------------------------------------------------------------
bluetooth:
  # -- Enable Bluetooth hostPath volume mount
  enabled: false
  # -- Host path for Bluetooth device (e.g., /sys/class/bluetooth/hci0)
  hostPath: /sys/class/bluetooth/hci0

# -----------------------------------------------------------------------------
# Service configuration
# -----------------------------------------------------------------------------
service:
  # -- Service type
  type: ClusterIP
  # -- HTTP port for the web UI (used for ingress)
  httpPort: 8581
  # -- Service ports
  ports:
    - name: http
      servicePort: 8581
      containerPort: 8581
      protocol: TCP
    - name: bonjour
      servicePort: 51650
      containerPort: 51650
      protocol: UDP
    - name: alexa
      servicePort: 40120
      containerPort: 40120
      protocol: TCP
    - name: controller
      servicePort: 53044
      containerPort: 53044
      protocol: TCP
  # -- Service annotations
  annotations: {}

# -----------------------------------------------------------------------------
# Ingress configuration
# -----------------------------------------------------------------------------
ingress:
  # -- Enable ingress
  enabled: false
  # -- Ingress class name
  className: ""
  # -- Ingress annotations
  annotations: {}
    # kubernetes.io/ingress.class: traefik
    # traefik.ingress.kubernetes.io/router.entrypoints: web, websecure
    # cert-manager.io/cluster-issuer: ca-issuer
  # -- Ingress host rules
  hosts:
    - host: homebridge.local
      paths:
        - path: /
          pathType: Prefix
  # -- Ingress TLS
  tls: []
  #  - secretName: homebridge-cert
  #    hosts:
  #      - homebridge.local

# -----------------------------------------------------------------------------
# Persistence configuration
# -----------------------------------------------------------------------------
persistence:
  # -- Enable persistent volume
  enabled: false
  # -- Use an existing PVC (claim name) instead of creating one
  existingClaim: ""
  # -- Storage class name
  storageClass: local-storage
  # -- Storage size
  size: 10Gi
  # -- Access mode
  accessMode: ReadWriteOnce
  # -- Reclaim policy
  reclaimPolicy: Delete
  # -- Local path on the host
  localPath: /var/local/k8s/homebridge
  # -- Node affinity hostname for the local PV
  nodeAffinityHost: ""

# -----------------------------------------------------------------------------
# Resource requests and limits
# -----------------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# -----------------------------------------------------------------------------
# Autoscaling configuration
# -----------------------------------------------------------------------------
autoscaling:
  # -- Enable horizontal pod autoscaler
  enabled: false
  # -- Minimum replicas
  minReplicas: 1
  # -- Maximum replicas
  maxReplicas: 1
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 90
  # -- Target memory utilization percentage
  targetMemoryUtilizationPercentage: 90
  scaleDown:
    stabilizationWindowSeconds: 300
    policies:
      - type: Percent
        value: 100
        periodSeconds: 15
  scaleUp:
    stabilizationWindowSeconds: 120
    policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 1
        periodSeconds: 15
    selectPolicy: Max

# -----------------------------------------------------------------------------
# Init container to fix permissions on the data volume
# -----------------------------------------------------------------------------
initChownData:
  # -- Enable init container to chown the data volume
  enabled: true
  # -- UID/GID to set on the data volume (should match containerSecurityContext.runAsUser)
  uid: 1000
  gid: 1000
  # -- Image for the init container
  image: busybox:1.36

# -----------------------------------------------------------------------------
# Scheduling
# -----------------------------------------------------------------------------
# -- Node selector for pod assignment
nodeSelector: {}
# -- Tolerations for pod assignment
tolerations: []
# -- Affinity for pod assignment
affinity: {}

# -----------------------------------------------------------------------------
# Environment variables
# -----------------------------------------------------------------------------
# -- Environment variables (map)
env: {}
  # TZ: America/Sao_Paulo
  # ENABLE_AVAHI: "0"
# -- Extra environment variables (list of name/value pairs)
extraEnv: []
  # - name: FOO
  #   value: bar

# -----------------------------------------------------------------------------
# ConfigMap configuration
# -----------------------------------------------------------------------------
config:
  # -- Create a ConfigMap
  create: false
  # -- ConfigMap data
  data: {}

# -----------------------------------------------------------------------------
# Extra volumes and mounts
# -----------------------------------------------------------------------------
# -- Additional volumes
extraVolumes: []
# -- Additional volume mounts
extraVolumeMounts: []
