{{- if eq .Values.app.mode "dashboard" }}

# Dashboard infra: auth module SA needs read access to the K8s API
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  labels:
    {{- include "kubernetes-dashboard.labels" . | nindent 4 }}
  name: {{ template "kubernetes-dashboard.fullname" . }}-auth-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: default
    namespace: {{ .Release.Namespace }}

---
# OIDC Group: admin --> cluster-admin (full access)
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  labels:
    {{- include "kubernetes-dashboard.labels" . | nindent 4 }}
  name: {{ template "kubernetes-dashboard.fullname" . }}-oidc-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: Group
    name: admin

---
{{- if .Values.app.oidcMonitoringGroup }}
# OIDC Group: monitoring --> view (read-only cluster access)
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  labels:
    {{- include "kubernetes-dashboard.labels" . | nindent 4 }}
  name: {{ template "kubernetes-dashboard.fullname" . }}-oidc-monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: Group
    name: {{ .Values.app.oidcMonitoringGroup }}
{{- end }}

{{- end }}
