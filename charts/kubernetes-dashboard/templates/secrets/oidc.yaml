{{- if and .Values.auth.oidc.enabled .Values.auth.oidc.issuerUrl .Values.auth.oidc.clientSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubernetes-dashboard.fullname" . }}-oidc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes-dashboard.labels" . | nindent 4 }}
type: Opaque
data:
  clientSecret: {{ .Values.auth.oidc.clientSecret | b64enc }}
{{- end }}
