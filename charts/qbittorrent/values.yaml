# -----------------------------------------------------------------------------
# Global settings
# -----------------------------------------------------------------------------
nameOverride: ""
fullnameOverride: ""

replicaCount: 1

controller:
  # -- StatefulSet or Deployment
  type: StatefulSet
  revisionHistoryLimit: 10

# -----------------------------------------------------------------------------
# Image
# -----------------------------------------------------------------------------
image:
  repository: lscr.io/linuxserver/qbittorrent
  tag: latest
  pullPolicy: Always

# -----------------------------------------------------------------------------
# Keel auto-update
# -----------------------------------------------------------------------------
keel:
  enabled: false
  policy: force
  trigger: poll
  pollSchedule: "@every 24h"
  matchTag: "true"

# -----------------------------------------------------------------------------
# Labels and annotations
# -----------------------------------------------------------------------------
commonLabels: {}
podLabels: {}
podAnnotations: {}

# -----------------------------------------------------------------------------
# Security Context
# -----------------------------------------------------------------------------
podSecurityContext:
  fsGroup: 1000
containerSecurityContext:
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

# -----------------------------------------------------------------------------
# Service
# -----------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 8080
  annotations: {}

# -----------------------------------------------------------------------------
# Ingress
# -----------------------------------------------------------------------------
ingress:
  enabled: false
  className: traefik
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web, websecure
    cert-manager.io/cluster-issuer: ca-issuer
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# -----------------------------------------------------------------------------
# Persistence
# -----------------------------------------------------------------------------
persistence:
  config:
    # - name: config
    #   mountPath: /config
    #   size: 10Gi
    # - name: downloads
    #   mountPath: /downloads
    #   size: 100Gi

# -----------------------------------------------------------------------------
# Environment variables
# -----------------------------------------------------------------------------
env:
  PUID: "1000"
  GUID: "1000"
  TZ: "America/Sao_Paulo"

extraEnv: []
extraVolumes: []
extraVolumeMounts: []

# -----------------------------------------------------------------------------
# Resources
# -----------------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1024Mi

# -----------------------------------------------------------------------------
# Probes
# -----------------------------------------------------------------------------
readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5

livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5

startupProbe:
  httpGet:
    path: /
    port: 8080
  failureThreshold: 30
  periodSeconds: 10
  timeoutSeconds: 5

# -----------------------------------------------------------------------------
# Autoscaling
# -----------------------------------------------------------------------------
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80

# -----------------------------------------------------------------------------
# Scheduling
# -----------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}
