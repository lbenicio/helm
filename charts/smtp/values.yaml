# helm install smtp ./charts/smtp --namespace default

# -----------------------------------------------------------------------------
# Global Docker image settings
# -----------------------------------------------------------------------------
image:
  # -- Image repository
  repository: registry.gitlab.com/egos-tech/smtp
  # -- Image tag (defaults to Chart.appVersion)
  tag: ""
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
imagePullSecrets: []
# -- Override the name of the chart
nameOverride: ""
# -- Override the full name of the release
fullnameOverride: ""

# -- Number of replicas (ignored if autoscaling.enabled is true)
replicaCount: 1

# -----------------------------------------------------------------------------
# ServiceAccount configuration
# -----------------------------------------------------------------------------
serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- ServiceAccount name (defaults to fullname)
  name: ""

# -----------------------------------------------------------------------------
# Keel auto-update annotations
# -----------------------------------------------------------------------------
keel:
  # -- Enable Keel auto-update annotations
  enabled: false
  # -- Keel update policy (e.g., force, major, minor, patch)
  policy: force
  # -- Keel trigger type (e.g., poll, webhook)
  trigger: poll
  # -- Keel poll schedule (cron syntax or @every duration)
  pollSchedule: "@every 24h"
  # -- Match tag pattern
  matchTag: "true"

# -----------------------------------------------------------------------------
# Labels
# -----------------------------------------------------------------------------
# -- Common labels to add to all resources
commonLabels: {}
# -- Pod-specific labels
podLabels: {}

# -----------------------------------------------------------------------------
# Security Context
# -----------------------------------------------------------------------------
# -- Pod-level security context
podSecurityContext:
  fsGroup: 0
# -- Container-level security context
containerSecurityContext:
  readOnlyRootFilesystem: false
  runAsNonRoot: false
  runAsUser: 0

# -----------------------------------------------------------------------------
# Service configuration
# -----------------------------------------------------------------------------
service:
  # -- Service type
  type: ClusterIP
  # -- Service port (SMTP)
  port: 25
  # -- Service annotations
  annotations: {}

# -----------------------------------------------------------------------------
# SMTP-specific configuration
# -----------------------------------------------------------------------------
smtp:
  # -- Networks allowed to relay through this SMTP server (e.g., ":0.0.0.0/0")
  relayNetworks: ""
  # -- SMTP aliases for the smarthost (e.g., "*.example.com")
  smarthostAliases: ""
  # -- Smarthost address (e.g., "smtp.example.com")
  smarthostAddress: ""
  # -- Smarthost port (e.g., "587")
  smarthostPort: ""
  # -- Smarthost username
  smarthostUser: ""
  # -- Smarthost password
  smarthostPassword: ""
  # -- Domains allowed to relay (colon-separated: "domain1 : domain2")
  relayDomains: ""

# -----------------------------------------------------------------------------
# Resource requests and limits
# -----------------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# -----------------------------------------------------------------------------
# Autoscaling configuration
# -----------------------------------------------------------------------------
autoscaling:
  # -- Enable horizontal pod autoscaler
  enabled: false
  # -- Minimum replicas
  minReplicas: 1
  # -- Maximum replicas
  maxReplicas: 1
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 90
  # -- Target memory utilization percentage
  targetMemoryUtilizationPercentage: 90
  scaleDown:
    stabilizationWindowSeconds: 300
    policies:
      - type: Percent
        value: 100
        periodSeconds: 15
  scaleUp:
    stabilizationWindowSeconds: 120
    policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 1
        periodSeconds: 15
    selectPolicy: Max

# -----------------------------------------------------------------------------
# Scheduling
# -----------------------------------------------------------------------------
# -- Node selector for pod assignment
nodeSelector: {}
# -- Tolerations for pod assignment
tolerations: []
# -- Affinity for pod assignment
affinity: {}

# -----------------------------------------------------------------------------
# Environment variables
# -----------------------------------------------------------------------------
# -- Extra environment variables (list of name/value pairs)
extraEnv: []
  # - name: FOO
  #   value: bar

# -----------------------------------------------------------------------------
# ConfigMap configuration
# -----------------------------------------------------------------------------
config:
  # -- Create a ConfigMap
  create: false
  # -- ConfigMap data
  data: {}

# -----------------------------------------------------------------------------
# Extra volumes and mounts
# -----------------------------------------------------------------------------
# -- Additional volumes
extraVolumes: []
# -- Additional volume mounts
extraVolumeMounts: []
