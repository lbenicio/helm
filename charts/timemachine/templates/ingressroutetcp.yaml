{{- if .Values.ingressRouteTCP.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: {{ include "timemachine.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "timemachine.labels" . | nindent 4 }}
  {{- with .Values.ingressRouteTCP.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  entryPoints:
    {{- toYaml .Values.ingressRouteTCP.entryPoints | nindent 4 }}
  routes:
  {{- range .Values.ingressRouteTCP.routes }}
    - match: {{ .match | quote }}
      {{- if .priority }}
      priority: {{ .priority }}
      {{- end }}
      services:
      {{- range .services }}
        - name: {{ .name }}
          port: {{ .port }}
          {{- if .weight }}
          weight: {{ .weight }}
          {{- end }}
      {{- end }}
  {{- end }}
  {{- with .Values.ingressRouteTCP.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
