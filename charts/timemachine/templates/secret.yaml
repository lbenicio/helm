{{- if .Values.credentials.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "timemachine.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "timemachine.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.credentials.usernameKey }}: {{ required "credentials.username is required when createSecret is true" .Values.credentials.username | quote }}
  {{ .Values.credentials.passwordKey }}: {{ required "credentials.password is required when createSecret is true" .Values.credentials.password | quote }}
{{- end }}
